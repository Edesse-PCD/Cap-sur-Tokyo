<style>
  :root{
    --ink:#1c1b1a; --paper:#f6f3ec; --paper2:#efe9dc;
    --card:#ffffff; --line:#e2dccd;
    --green:#2e5e4e; --green-soft:#e7efe9;
    --red:#c0282c; --red-soft:#f6e3e1;
    --indigo:#38507a; --indigo-soft:#e6eaf1;
    --muted:#7d776c; --gold:#b58a2e;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Zen Kaku Gothic New", system-ui, -apple-system, sans-serif;
    font-size:17px; line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:16px}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 120px}

:root{--side:236px;--maxw:860px;--shellw:calc(var(--side) + var(--maxw) + 32px)}
  /* Top bar */
  header.top{background:var(--ink);color:var(--paper);padding:16px 0 14px;position:relative;overflow:hidden}
  header.top:before{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 92% -30%, rgba(192,40,44,.34), transparent 40%)}
  .top-in{max-width:var(--shellw);margin:0 auto;padding:0 18px;position:relative}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;position:relative}
  .brand .jp{font-family:"Anton";font-size:12px;letter-spacing:3px;color:var(--red);
    writing-mode:vertical-rl;position:absolute;right:0;top:-2px;opacity:.9}
  .brand h1{font-family:"Anton";font-size:clamp(26px,6vw,40px);letter-spacing:1px;
    text-transform:uppercase;line-height:.95}
  .brand .sub{color:#c9c3b6;font-size:13px;max-width:44ch;align-self:center}

  /* Shell + content */
  .shell{max-width:var(--shellw);margin:0 auto;padding:20px 18px 0;display:grid;grid-template-columns:1fr;gap:22px}
  .content{min-width:0;padding-bottom:118px}

  /* Nav — mobile = barre du bas */
  nav.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;overflow-x:auto;
    background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));scrollbar-width:none}
  nav.nav::-webkit-scrollbar{display:none}
  nav.nav button{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;
    border:none;background:transparent;color:var(--muted);padding:6px 11px;border-radius:10px;
    font-size:10px;font-weight:600;min-width:60px;white-space:nowrap}
  nav.nav button .ic{font-size:19px;line-height:1}
  nav.nav button.on{color:var(--green);background:var(--green-soft)}

  @media(min-width:980px){
    .shell{grid-template-columns:var(--side) minmax(0,var(--maxw));gap:32px;padding-top:28px}
    .content{padding-bottom:60px}
    nav.nav{position:sticky;top:20px;align-self:start;flex-direction:column;gap:4px;overflow:visible;
      background:transparent;backdrop-filter:none;border-top:none;padding:0}
    nav.nav button{flex-direction:row;justify-content:flex-start;gap:11px;width:100%;
      padding:11px 14px;font-size:14.5px;border-radius:11px;min-width:0}
    nav.nav button .ic{font-size:17px}
    nav.nav button.on{color:var(--ink);background:var(--card);border:1px solid var(--line);font-weight:700}
    nav.nav button:hover{background:var(--paper2)}
  }

  /* a11y polish */
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible{
    outline:2px solid var(--green);outline-offset:2px}
  section.panel{display:none;animation:fade .25s ease}
  section.panel.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .eyebrow{font-family:"Anton";letter-spacing:2px;text-transform:uppercase;
    font-size:12px;color:var(--green);margin-bottom:10px}
  .panel h2{font-family:"Anton";font-size:28px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .lead{color:var(--muted);font-size:16px;margin:0 0 18px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .grid{display:grid;gap:12px}
  .g3{grid-template-columns:1fr 1fr}
  @media(min-width:620px){.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr 1fr}}

  /* Stat tiles */
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .stat .k{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .stat .v{font-family:"Anton";font-size:34px;line-height:1.05;margin-top:4px}
  .stat .v small{font-family:"Zen Kaku Gothic New";font-size:13px;color:var(--muted);font-weight:500}
  .stat.green{background:var(--green);color:#fff;border-color:var(--green)}
  .stat.green .k{color:#cfe0d8}
  .stat.red{background:var(--red);color:#fff;border-color:var(--red)}
  .stat.red .k{color:#f4cfcd}

  /* Flight progress */
  .voyage{margin:4px 0 22px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px 16px 8px;position:relative}
  .voyage .cap{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .voyage .pct{font-family:"Anton";color:var(--green)}
  #flightSvg{width:100%;height:96px;display:block}

  /* lists */
  .row{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .check{flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:2px solid var(--green);
    background:#fff;margin-top:1px;display:grid;place-items:center;color:#fff;font-size:13px}
  .check.done{background:var(--green)}
  .row .txt{flex:1;font-size:16px}
  .row.done .txt{color:var(--muted);text-decoration:line-through}
  .who{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
  .who-d{background:var(--red-soft);color:var(--red)}
  .who-m{background:var(--indigo-soft);color:var(--indigo)}
  .who-x{background:var(--green-soft);color:var(--green)}
  .flag{display:inline-block;background:var(--gold);color:#fff;font-size:10px;font-weight:700;
    padding:1px 7px;border-radius:6px;margin-right:6px;vertical-align:middle;letter-spacing:.4px}
  .del{flex:0 0 auto;border:none;background:transparent;color:var(--muted);font-size:18px;line-height:1;padding:0 2px}
  .del:hover{color:var(--red)}

  .cat-h{font-family:"Anton";font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--ink);margin:20px 0 2px;display:flex;align-items:center;gap:8px}
  .cat-h:first-child{margin-top:4px}
  .cat-h .dot{width:9px;height:9px;border-radius:50%}

  /* filters / chips */
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:20px;
    padding:6px 13px;font-size:13px;color:var(--muted)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* add forms */
  .add{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;background:var(--paper2);
    border:1px dashed var(--line);border-radius:var(--radius);padding:12px}
  .add input,.add select,.add textarea{
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;flex:1 1 140px;min-width:0}
  .add .full{flex:1 1 100%}
  .btn{background:var(--green);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:14px}
  .btn.ghost{background:transparent;color:var(--green);border:1px solid var(--green)}
  .btn.red{background:var(--red)}

  /* deadlines */
  .dl{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .dl:last-child{border-bottom:none}
  .dl .when{flex:0 0 auto;text-align:center;min-width:54px}
  .dl .when .d{font-family:"Anton";font-size:22px;line-height:1}
  .dl .when .m{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:1px}
  .dl .cd{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .cd.soon{background:var(--red-soft);color:var(--red)}
  .cd.ok{background:var(--green-soft);color:var(--green)}
  .cd.none{background:var(--paper2);color:var(--muted)}
  .cd.past{background:#eee;color:#999}

  /* budget */
  table.bud{width:100%;border-collapse:collapse;font-size:14px}
  table.bud th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);padding:8px 6px;border-bottom:2px solid var(--line)}
  table.bud td{padding:9px 6px;border-bottom:1px solid var(--line)}
  table.bud td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .type-tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px}
  .type-tag.mensuel{background:var(--indigo-soft);color:var(--indigo)}
  .type-tag.ponctuel{background:var(--paper2);color:var(--muted)}
  .settings-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .settings-row label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .settings-row input{width:74px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;text-align:center}

  /* map */
  #map{height:300px;border-radius:var(--radius);border:1px solid var(--line);background:var(--paper2);z-index:1}
  @media(min-width:980px){#map{height:420px}}
  .map-note{font-size:12.5px;color:var(--muted);margin:8px 2px 16px}
  .place{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
  .place:last-child{border-bottom:none}
  .pin{flex:0 0 auto;width:11px;height:11px;border-radius:50%;margin-top:5px}
  .place .pn{font-weight:700;font-size:14.5px}
  .place .pa{font-size:12.5px;color:var(--muted)}
  .place .pl{font-size:12.5px}
  .place a{color:var(--green);font-weight:700;text-decoration:none}
  .place .status{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--paper2);color:var(--muted);font-weight:700}

  .empty{color:var(--muted);font-size:14px;font-style:italic;padding:14px 2px}
  .foot{margin-top:26px;font-size:12px;color:var(--muted);text-align:center}
  .reset{background:none;border:none;color:var(--muted);text-decoration:underline;font-size:12px;cursor:pointer}
</style>

<header class="top">
  <div class="top-in">
    <div class="brand">
      <span class="jp">東京</span>
      <h1>Cap sur Tokyo</h1>

</header>

<div class="shell">

</div>

/* ---------- state ---------- */
let S = {};

async function boot(){
  buildTabs();
  P("accueil").innerHTML = '<div class="empty" style="padding:40px 0">Connexion à Firebase…</div>';
  P("accueil").classList.add("on");

  try{
    const snap = await getDoc(TRIP_REF);
    if(snap.exists()){
      const data = snap.data();
      KEYS.forEach(k => { S[k] = (data[k] !== undefined) ? data[k] : SEED[k]; });
    } else {
      S = JSON.parse(JSON.stringify(SEED));
      await setDoc(TRIP_REF, S);
    }
  }catch(e){
    console.error("Connexion Firebase impossible, données locales par défaut :", e);
    S = JSON.parse(JSON.stringify(SEED));
  }

  renderAll();
  show(location.hash.replace("#","")||"accueil");

  // Synchronisation en temps réel entre les deux appareils (Edesse / Loan)
  onSnapshot(TRIP_REF, (snap)=>{
    if(suppressSnapshot) return;
    if(!snap.exists()) return;
    const data = snap.data();
    KEYS.forEach(k => { if(data[k] !== undefined) S[k] = data[k]; });
    renderAll();
  }, (err)=>console.error("Erreur de synchronisation Firebase :", err));
}

/* ---------- computed ---------- */
const todoStats=()=>{const t=S.todos.length,d=S.todos.filter(x=>x.done).length;return{t,d,pct:t?Math.round(d/t*100):0}};
function budgetTotals(){
  const b=S.budget; let pon=0,men=0;
  b.items.forEach(i=>{ if(i.type==="mensuel") men+=+i.amount||0; else pon+=+i.amount||0; });
  const total=pon+men*b.months;
  return {pon,men,total,perMonth:men,perPerson:total/2};
}
const spentTotal=()=>S.expenses.reduce((s,e)=>s+(+e.amount||0),0);
function balance(){
  let d=0,m=0; S.expenses.forEach(e=>{ if(e.who==="Edesse")d+=+e.amount||0; else if(e.who==="Loan")m+=+e.amount||0; });
  return {d,m,total:d+m,diff:(d+m)/2 - d};
}

function whoSplit(){
  const open=S.todos.filter(t=>!t.done);
  const by={};["Edesse","Loan","Les deux"].forEach(w=>by[w]=open.filter(t=>t.who===w).length);
  if(!open.length) return `<div class="empty">Tout est coché 🎉</div>`;
  return Object.entries(by).map(([w,n])=>
    `<div class="row" style="border:none;padding:6px 0"><span class="who ${whoCls(w)}">${w}</span>
     <div class="txt">${n} tâche${n>1?"s":""} en cours</div></div>`).join("");
}
function drawFlight(pct){
  const svg=document.getElementById("flightSvg"); if(!svg) return;
  const NS="http://www.w3.org/2000/svg"; svg.innerHTML="";
  const path=document.createElementNS(NS,"path");
  const dd="M 26 78 Q 300 -28 574 40";
  path.setAttribute("d",dd); path.setAttribute("fill","none");
  path.setAttribute("stroke","#cfc8b8"); path.setAttribute("stroke-width","2");
  path.setAttribute("stroke-dasharray","2 7"); path.setAttribute("stroke-linecap","round");
  svg.appendChild(path);
  const done=document.createElementNS(NS,"path");
  done.setAttribute("d",dd); done.setAttribute("fill","none");
  done.setAttribute("stroke","var(--green)"); done.setAttribute("stroke-width","2.5");
  done.setAttribute("stroke-linecap","round"); svg.appendChild(done);
  const L=path.getTotalLength(); const t=Math.max(pct,0)/100;
  done.setAttribute("stroke-dasharray",`${L*t} ${L}`);
  [[26,78,"Paris"],[574,40,"Tokyo"]].forEach(([x,y])=>{
    const c=document.createElementNS(NS,"circle");
    c.setAttribute("cx",x);c.setAttribute("cy",y);c.setAttribute("r","5");
    c.setAttribute("fill","#fff");c.setAttribute("stroke","var(--ink)");c.setAttribute("stroke-width","2");svg.appendChild(c);
  });
  const pt=path.getPointAtLength(L*t);
  const ahead=path.getPointAtLength(Math.min(L*t+1,L));
  const ang=Math.atan2(ahead.y-pt.y,ahead.x-pt.x)*180/Math.PI;
  const g=document.createElementNS(NS,"text");
  g.setAttribute("x",pt.x);g.setAttribute("y",pt.y);g.setAttribute("font-size","22");
  g.setAttribute("text-anchor","middle");g.setAttribute("dominant-baseline","central");
  g.setAttribute("transform",`rotate(${ang} ${pt.x} ${pt.y})`);
  g.textContent="✈️"; svg.appendChild(g);
}

/* ---------- ÉCHÉANCES ---------- */
const MOIS=["jan","fév","mar","avr","mai","juin","juil","aoû","sep","oct","nov","déc"];
function dateBlock(d){ if(!d) return `<div class="when"><div class="d">—</div><div class="m"></div></div>`;
  const x=new Date(d+"T00:00:00"); return `<div class="when"><div class="d">${x.getDate()}</div><div class="m">${MOIS[x.getMonth()]}</div></div>`;}
function countdown(d){
  if(!d) return {cls:"none",txt:"à définir"};
  const today=new Date(); today.setHours(0,0,0,0);
  const x=new Date(d+"T00:00:00"); const days=Math.round((x-today)/864e5);
  if(days<0) return {cls:"past",txt:"passé"};
  if(days===0) return {cls:"soon",txt:"aujourd'hui"};
  if(days<=21) return {cls:"soon",txt:"J-"+days};
  return {cls:"ok",txt:"J-"+days};
}
function renderEcheances(){
  const sorted=[...S.deadlines].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(!a.date) return 1; if(!b.date) return -1; return a.date.localeCompare(b.date);});
  const body = sorted.length? sorted.map(d=>{
    const cd=countdown(d.date);
    return `<div class="dl ${d.done?"done":""}">
      <div class="check ${d.done?"done":""}" data-dlt="${d.id}" style="margin-top:0">${d.done?"✓":""}</div>
      ${dateBlock(d.date)}
      <div style="flex:1;${d.done?"color:var(--muted);text-decoration:line-through":""}">${esc(d.label)}</div>
      <input type="date" value="${d.date||""}" data-dld="${d.id}" style="border:1px solid var(--line);border-radius:8px;padding:6px">
      <span class="cd ${cd.cls}">${cd.txt}</span>
      <button class="del" data-deldl="${d.id}">×</button></div>`;
  }).join("") : `<div class="empty">Aucune échéance.</div>`;
  P("echeances").innerHTML=`
    <div class="eyebrow">Calendrier</div>
    <h2>Échéances</h2>
    <p class="lead">Pose une date sur chaque étape : le compte à rebours s'occupe du reste.</p>
    <div class="card">${body}</div>
    <div class="add">
      <input id="ndLabel" class="full" placeholder="Nouvelle échéance…">
      <input id="ndDate" type="date">
      <button class="btn" id="ndAdd">Ajouter</button>
    </div>`;
  document.querySelectorAll("[data-dlt]").forEach(b=>b.onclick=()=>toggleDl(b.dataset.dlt));
  document.querySelectorAll("[data-dld]").forEach(i=>i.onchange=()=>setDlDate(i.dataset.dld,i.value));
  document.querySelectorAll("[data-deldl]").forEach(b=>b.onclick=()=>delDl(b.dataset.deldl));
  document.getElementById("ndAdd").onclick=addDl;
}

async function setDlDate(id,v){const d=S.deadlines.find(x=>x.id===id);d.date=v||null;await save("deadlines",S.deadlines);renderEcheances();renderAccueil();}

      <div class="stat"><div class="k">Par mois × ${b.months}</div><div class="v">${eur(t.men*b.months)}</div></div>
      <div class="stat green"><div class="k">Total à deux</div><div class="v">${eur(t.total)}</div></div>
    </div>
    <div class="add">
      <input id="biLabel" placeholder="Nouveau poste…" style="flex:2 1 160px">
      <select id="biType"><option value="mensuel">par mois</option><option value="ponctuel">une fois</option></select>
      <input id="biAmt" type="number" placeholder="€" style="flex:0 1 90px">
      <button class="btn" id="biAdd">Ajouter</button>
    </div>`;
  document.querySelectorAll("[data-bud]").forEach(i=>i.onchange=()=>{const it=b.items.find(x=>x.id===i.dataset.bud);it.amount=+i.value||0;save("budget",b);renderBudget();renderAccueil();});
  document.querySelectorAll("[data-delbud]").forEach(x=>x.onclick=()=>{b.items=b.items.filter(i=>i.id!==x.dataset.delbud);save("budget",b);renderBudget();renderAccueil();});
  document.getElementById("bMonths").onchange=e=>{b.months=Math.max(1,Math.min(3,+e.target.value||1));save("budget",b);renderBudget();renderAccueil();};
  document.getElementById("bRate").onchange=e=>{b.rate=+e.target.value||165;save("budget",b);renderBudget();};
  document.getElementById("biAdd").onclick=()=>{
    const l=document.getElementById("biLabel").value.trim(); if(!l)return;
    b.items.push({id:uid(),label:l,cat:"Divers",type:document.getElementById("biType").value,amount:+document.getElementById("biAmt").value||0});
    save("budget",b);renderBudget();renderAccueil();
  };
}

/* ---------- DÉPENSES ---------- */
function renderDepenses(){
  const bal=balance();
  const rows=[...S.expenses].reverse().map(e=>`
    <div class="row">
      <div class="txt"><strong>${esc(e.label)}</strong>${e.date?` <span style="color:var(--muted);font-size:12px">· ${esc(e.date)}</span>`:""}</div>
      <span class="who ${whoCls(e.who)}">${e.who}</span>
      <div style="font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap">${eur(+e.amount||0)}</div>
      <button class="del" data-delexp="${e.id}">×</button></div>`).join("");
  let settle="";
  if(bal.total>0){
    if(Math.abs(bal.diff)<1) settle=`Vous êtes à l'équilibre ✓`;
    else if(bal.diff>0) settle=`Loan doit <strong>${eur(bal.diff)}</strong> à Edesse`;
    else settle=`Edesse doit <strong>${eur(-bal.diff)}</strong> à Loan`;
  }
  P("depenses").innerHTML=`
    <div class="eyebrow">Suivi réel</div>
    <h2>Dépenses</h2>
    <p class="lead">Note ce qui est payé et par qui. L'équilibrage entre vous deux se calcule tout seul.</p>
    <div class="grid g3">
      <div class="stat red"><div class="k">Total dépensé</div><div class="v">${eur(bal.total)}</div></div>
      <div class="stat"><div class="k">Payé par Edesse</div><div class="v">${eur(bal.d)}</div></div>
      <div class="stat"><div class="k">Payé par Loan</div><div class="v">${eur(bal.m)}</div></div>
    </div>
    ${bal.total>0?`<div class="card" style="margin-top:12px;text-align:center">${settle}</div>`:""}
    <div class="card" style="margin-top:14px">${rows||`<div class="empty">Aucune dépense pour l'instant.</div>`}</div>
    <div class="add">
      <input id="exLabel" placeholder="Dépense…" style="flex:2 1 150px">
      <input id="exAmt" type="number" placeholder="€" style="flex:0 1 80px">
      <select id="exWho"><option>Edesse</option><option>Loan</option></select>
      <input id="exDate" type="date">
      <button class="btn" id="exAdd">Ajouter</button>
    </div>`;
  document.querySelectorAll("[data-delexp]").forEach(b=>b.onclick=()=>{S.expenses=S.expenses.filter(x=>x.id!==b.dataset.delexp);save("expenses",S.expenses);renderDepenses();renderAccueil();});
  document.getElementById("exAdd").onclick=()=>{
    const l=document.getElementById("exLabel").value.trim(),a=+document.getElementById("exAmt").value;
    if(!l||!a)return;
    S.expenses.push({id:uid(),label:l,amount:a,who:document.getElementById("exWho").value,date:document.getElementById("exDate").value||""});
    save("expenses",S.expenses);renderDepenses();renderAccueil();
  };
}

/* ---------- CARTE & LIEUX ---------- */
const PCOLOR={"À visiter":"#c0282c","Logement":"#2e5e4e","Entreprise":"#38507a","Autre":"#7d776c"};
let map=null, markers=[];
function renderCarte(){
  const cats=["À visiter","Logement","Entreprise","Autre"];
  let body="";
  cats.forEach(c=>{
    const items=S.places.filter(p=>p.cat===c); if(!items.length) return;
    body+=`<div class="cat-h"><span class="dot" style="background:${PCOLOR[c]}"></span>${c}</div>`;
    items.forEach(p=>{
      const q=p.lat!=null?`${p.lat},${p.lng}`:encodeURIComponent((p.name+" "+(p.address||""))+" Tokyo");
      body+=`<div class="place">
        <span class="pin" style="background:${PCOLOR[c]}"></span>
        <div style="flex:1">
          <div class="pn">${esc(p.name)} ${p.status?`<span class="status">${esc(p.status)}</span>`:""}</div>
          ${p.address?`<div class="pa">${esc(p.address)}</div>`:""}
          ${p.notes?`<div class="pa">${esc(p.notes)}</div>`:""}
          <div class="pl"><a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">Ouvrir dans Maps ↗</a>
          ${p.link?` · <a href="${esc(p.link)}" target="_blank" rel="noopener">Lien ↗</a>`:""}
          ${p.lat!=null?` · <a href="#" data-fly="${p.id}">Voir sur la carte</a>`:""}</div>
        </div>
        <button class="del" data-delpl="${p.id}">×</button></div>`;
    });
  });
  P("carte").innerHTML=`
    <div class="eyebrow">Repérage</div>
    <h2>Carte & lieux</h2>
    <p class="lead">Pose tes points : à visiter, logements potentiels, l'entreprise de Loan. Chaque lieu s'ouvre dans Google Maps.</p>
    <div id="map"></div>
    <div class="map-note">Astuce : pour placer un point précis, ouvre Google Maps, clic droit sur l'endroit → clique sur les chiffres (coordonnées) pour les copier, puis colle-les ci-dessous.</div>
    <div class="card">${body||`<div class="empty">Aucun lieu. Ajoute-en un ci-dessous.</div>`}</div>
    <div class="add">
      <input id="plName" placeholder="Nom du lieu…" style="flex:2 1 150px">
      <select id="plCat">${cats.map(c=>`<option>${c}</option>`).join("")}</select>
      <input id="plAddr" placeholder="Adresse / quartier" class="full">
      <input id="plLat" placeholder="Latitude (ex 35.68)" type="number" step="any">
      <input id="plLng" placeholder="Longitude (ex 139.76)" type="number" step="any">
      <input id="plLink" placeholder="Lien (annonce, site…)" class="full">
      <input id="plNotes" placeholder="Note" class="full">
      <button class="btn" id="plAdd">Ajouter le lieu</button>
    </div>`;
  document.querySelectorAll("[data-delpl]").forEach(b=>b.onclick=()=>{S.places=S.places.filter(x=>x.id!==b.dataset.delpl);save("places",S.places);renderCarte();if(current==="carte")initMap();});
  document.querySelectorAll("[data-fly]").forEach(a=>a.onclick=(e)=>{e.preventDefault();const p=S.places.find(x=>x.id===a.dataset.fly);if(map&&p.lat!=null){map.setView([p.lat,p.lng],15);}});
  document.getElementById("plAdd").onclick=()=>{
    const n=document.getElementById("plName").value.trim(); if(!n)return;
    const lat=parseFloat(document.getElementById("plLat").value), lng=parseFloat(document.getElementById("plLng").value);
    S.places.push({id:uid(),name:n,cat:document.getElementById("plCat").value,
      address:document.getElementById("plAddr").value.trim(),
      lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng,
      link:document.getElementById("plLink").value.trim(),notes:document.getElementById("plNotes").value.trim(),status:""});
    save("places",S.places);renderCarte();if(current==="carte")initMap();
  };
}
function initMap(){
  const el=document.getElementById("map"); if(!el) return;
  if(typeof L==="undefined"){ el.innerHTML=`<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">La carte a besoin d'une connexion internet. La liste ci-dessous et les liens Google Maps fonctionnent dans tous les cas.</div>`; el.style.height="auto"; return; }
  if(!map){
    map=L.map(el,{scrollWheelZoom:false}).setView([35.68,139.76],11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
  }
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const pts=S.places.filter(p=>p.lat!=null);
  pts.forEach(p=>{
    const m=L.circleMarker([p.lat,p.lng],{radius:8,color:"#fff",weight:2,fillColor:PCOLOR[p.cat]||"#7d776c",fillOpacity:1})
      .addTo(map).bindPopup(`<strong>${esc(p.name)}</strong><br>${esc(p.cat)}`);
    markers.push(m);
  });
  if(pts.length){const g=L.featureGroup(markers);try{map.fitBounds(g.getBounds().pad(0.25));}catch(e){}}
  setTimeout(()=>map.invalidateSize(),120);
}

/* ---------- DÉFIS ---------- */
function renderDefis(){
  const done=S.defis.filter(d=>d.done).length, tot=S.defis.length, pct=tot?Math.round(done/tot*100):0;
  const body=S.defis.map(d=>`
    <div class="row ${d.done?"done":""}">
      <div class="check ${d.done?"done":""}" data-dft="${d.id}">${d.done?"✓":""}</div>
      <div class="txt">${esc(d.text)}</div>
      <button class="del" data-deldf="${d.id}">×</button></div>`).join("") || `<div class="empty">Ajoute un premier défi 👇</div>`;
  P("defis").innerHTML=`
    <div class="eyebrow">Nos envies</div>
    <h2>Défis à relever</h2>
    <p class="lead">Notre to-do plaisir. On coche dès qu'on l'a vécu — et la barre se remplit.</p>
    <div class="voyage" style="padding:16px">
      <div class="cap"><span>Défis relevés</span><span class="pct" style="color:var(--red)">${done}/${tot}</span></div>
      <div style="height:11px;background:var(--paper2);border-radius:20px;overflow:hidden;margin-top:6px">
        <div style="height:100%;width:${pct}%;background:var(--red);border-radius:20px;transition:width .4s"></div></div>
    </div>
    <div class="card">${body}</div>
    <div class="add">
      <input id="dfText" class="full" placeholder="Nouveau défi / envie…">
      <button class="btn red" id="dfAdd">Ajouter</button>
    </div>`;
  document.querySelectorAll("[data-dft]").forEach(b=>b.onclick=()=>toggleDefi(b.dataset.dft));
  document.querySelectorAll("[data-deldf]").forEach(b=>b.onclick=()=>delDefi(b.dataset.deldf));
  document.getElementById("dfAdd").onclick=addDefi;
  document.getElementById("dfText").addEventListener("keydown",e=>{if(e.key==="Enter")addDefi();});
}
async function toggleDefi(id){const d=S.defis.find(x=>x.id===id);d.done=!d.done;await save("defis",S.defis);renderDefis();renderAccueil();}
async function delDefi(id){S.defis=S.defis.filter(x=>x.id!==id);await save("defis",S.defis);renderDefis();renderAccueil();}
async function addDefi(){const t=document.getElementById("dfText").value.trim();if(!t)return;S.defis.push({id:uid(),text:t,done:false});await save("defis",S.defis);renderDefis();renderAccueil();}

/* ---------- BONNES ADRESSES ---------- */
const ACATS=["Restos","Cafés & douceurs","Bars & sorties","Shopping & friperies","Conbini & courses","Autre"];
const ACOLOR={"Restos":"#c0282c","Cafés & douceurs":"#b58a2e","Bars & sorties":"#38507a","Shopping & friperies":"#2e5e4e","Conbini & courses":"#7d776c","Autre":"#7d776c"};
let aFilter="Toutes";
function renderAdresses(){
  const list=S.adresses.filter(a=>aFilter==="Toutes"||a.cat===aFilter);
  let body="";
  ACATS.forEach(c=>{
    const items=list.filter(a=>a.cat===c); if(!items.length) return;
    body+=`<div class="cat-h"><span class="dot" style="background:${ACOLOR[c]}"></span>${c}</div>`;
    items.forEach(a=>{
      const q=encodeURIComponent((a.name+" "+(a.area||""))+" Tokyo");
      body+=`<div class="place">
        <button class="del" data-favadr="${a.id}" style="color:${a.fav?'var(--red)':'var(--muted)'};font-size:16px;margin-top:2px">${a.fav?"❤":"♡"}</button>
        <div style="flex:1">
          <div class="pn">${esc(a.name)}</div>
          ${a.area?`<div class="pa">${esc(a.area)}</div>`:""}
          ${a.note?`<div class="pa">${esc(a.note)}</div>`:""}
          <div class="pl"><a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">Ouvrir dans Maps ↗</a>${a.link?` · <a href="${esc(a.link)}" target="_blank" rel="noopener">Lien ↗</a>`:""}</div>
        </div>
        <button class="del" data-deladr="${a.id}">×</button></div>`;
    });
  });
  P("adresses").innerHTML=`
    <div class="eyebrow">Carnet</div>
    <h2>Bonnes adresses</h2>
    <p class="lead">Les pépites qu'on repère ou qu'on teste, rangées par catégorie. ❤ = coup de cœur.</p>
    <div class="chips">${["Toutes",...ACATS].map(c=>`<button class="chip ${aFilter===c?"on":""}" data-acat="${c}">${c}</button>`).join("")}</div>
    <div class="card">${body||`<div class="empty">Aucune adresse pour ce filtre.</div>`}</div>
    <div class="add">
      <input id="adName" placeholder="Nom de l'adresse…" style="flex:2 1 150px">
      <select id="adCat">${ACATS.map(c=>`<option>${c}</option>`).join("")}</select>
      <input id="adArea" placeholder="Quartier" style="flex:1 1 120px">
      <input id="adNote" placeholder="Note (pourquoi on aime)" class="full">
      <input id="adLink" placeholder="Lien (site, insta…)" class="full">
      <button class="btn" id="adAdd">Ajouter l'adresse</button>
    </div>`;
  document.querySelectorAll("[data-acat]").forEach(b=>b.onclick=()=>{aFilter=b.dataset.acat;renderAdresses();});
  document.querySelectorAll("[data-favadr]").forEach(b=>b.onclick=()=>{const a=S.adresses.find(x=>x.id===b.dataset.favadr);a.fav=!a.fav;save("adresses",S.adresses);renderAdresses();});
  document.querySelectorAll("[data-deladr]").forEach(b=>b.onclick=()=>{S.adresses=S.adresses.filter(x=>x.id!==b.dataset.deladr);save("adresses",S.adresses);renderAdresses();});
  document.getElementById("adAdd").onclick=()=>{
    const n=document.getElementById("adName").value.trim(); if(!n)return;
    S.adresses.push({id:uid(),name:n,cat:document.getElementById("adCat").value,area:document.getElementById("adArea").value.trim(),note:document.getElementById("adNote").value.trim(),link:document.getElementById("adLink").value.trim(),fav:false});
    save("adresses",S.adresses);renderAdresses();
  };
}

/* ---------- reset ---------- */
document.getElementById("reset").onclick=async()=>{
  if(!confirm("Effacer toutes les données et repartir des valeurs d'origine ?")) return;
  for(const k of KEYS) await save(k,SEED[k]);
  S=JSON.parse(JSON.stringify(SEED)); renderAll(); show("accueil");
};

boot();
</script>
